{% extends "attendance/base_attendance.html" %}

{% block attendance_content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-danger">
        <div class="card-header bg-danger text-white">
          <h3 class="card-title">Confirm Delete</h3>
        </div>
        <div class="card-body">
          <p>
            Are you sure you want to delete the practice on <strong>{{ object.date }}</strong> at {{
            object.location }}?
          </p>
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirm Delete</button>
            <a href="{% url 'attendance:practice_list' %}" class="btn btn-secondary">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock attendance_content %}
