{% extends "attendance/base_attendance.html" %}

{% load crispy_forms_tags %}

{% block attendance_content %}
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">
            {% if form.instance.pk %}
              Edit Skater
            {% else %}
              Add Skater
            {% endif %}
          </h3>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-3">
              <button type="submit" class="btn btn-primary">Save</button>
              <a href="{% url 'attendance:skater_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock attendance_content %}
